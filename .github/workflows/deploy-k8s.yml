name: Deploy To Kubernetes

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'prod' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://thejammers.org' }}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'your_bot_username' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build application
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jammers
          SESSION_SECRET: ci-local-session-secret
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ env.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME }}
          ENABLE_DEV_AUTH: "true"
        run: npm run build

      - name: Compute image references
        id: image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_REF="${IMAGE_NAME}:sha-${GITHUB_SHA}"
          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/jammers
            SESSION_SECRET=ci-local-session-secret
            ENABLE_DEV_AUTH=true
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${{ env.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME }}
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.name }}:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply Kubernetes manifests
        run: kubectl apply -k infra/k8s/overlays/production

      - name: Run Prisma migrations
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          MIGRATION_JOB="jammers-web-migrate-${GITHUB_SHA::7}"
          sed \
            -e "s/name: jammers-web-migrate/name: ${MIGRATION_JOB}/" \
            -e "s|ghcr.io/kinteus/jammers-web:latest|${IMAGE_REF}|g" \
            infra/k8s/base/migration-job.example.yaml \
            | kubectl -n "$K8S_NAMESPACE" apply -f -
          kubectl -n "$K8S_NAMESPACE" wait --for=condition=complete --timeout=10m "job/${MIGRATION_JOB}"
          kubectl -n "$K8S_NAMESPACE" logs "job/${MIGRATION_JOB}"

      - name: Roll out deployment
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/jammers-web app="${IMAGE_REF}"
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/jammers-web --timeout=10m

      - name: Deployment summary
        run: |
          kubectl -n "$K8S_NAMESPACE" get deployment,pods,svc,ingress
